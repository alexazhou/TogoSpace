name: Release macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        submodules: recursive
        lfs: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-release-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-release-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install frontend dependencies
      working-directory: frontend
      run: |
        rm -f package-lock.json
        npm install

    - name: Build macOS app
      run: python scripts/build_mac.py

    - name: Import Apple certificate (optional)
      if: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
      run: |
        # 创建临时 keychain
        security create-keychain -p actions build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p actions build.keychain

        # 导入证书（密码可能为空）
        echo "${{ secrets.APPLE_CERTIFICATE_P12 }}" | base64 -d > cert.p12
        CERT_PASSWORD="${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
        if [ -n "$CERT_PASSWORD" ]; then
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
        else
          security import cert.p12 -k build.keychain -T /usr/bin/codesign
        fi
        rm cert.p12

        # 允许 codesign 访问 keychain
        security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

    - name: Sign app (optional)
      if: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
      run: |
        APP_PATH=$(ls -d dist/*.app | head -1)
        codesign --deep --force --options=runtime \
          --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
          --entitlements scripts/check/entitlements.plist \
          "$APP_PATH"

    - name: Verify signature (optional)
      if: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
      run: |
        APP_PATH=$(ls -d dist/*.app | head -1)
        codesign --verify --deep --strict "$APP_PATH"

    - name: Notarize app (optional)
      if: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_ID != '' }}
      run: |
        APP_PATH=$(ls -d dist/*.app | head -1)
        APP_NAME=$(basename "$APP_PATH")

        # 打包为 zip 用于公证提交
        ditto -c -k --keepParent "$APP_PATH" "notarize.zip"

        # 提交公证并等待结果
        xcrun notarytool submit "notarize.zip" \
          --apple-id "${{ secrets.APPLE_ID }}" \
          --password "${{ secrets.APPLE_APP_PASSWORD }}" \
          --team-id "${{ secrets.APPLE_TEAM_ID }}" \
          --wait

        # Staple 公证结果到 app
        xcrun stapler staple "$APP_PATH"

        rm "notarize.zip"
        echo "✅ Notarization completed"

    - name: Zip app bundle
      run: |
        APP_PATH=$(ls -d dist/*.app | head -1)
        APP_NAME=$(basename "$APP_PATH")
        ZIP_NAME="${APP_NAME%.app}-macos.zip"
        ditto -c -k --keepParent "$APP_PATH" "dist/${ZIP_NAME}"
        echo "ZIP_PATH=dist/${ZIP_NAME}" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "AgentTeam ${{ github.ref_name }}"
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: ${{ env.ZIP_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
