name: Release macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-13-large

    env:
      TARGET_ARCH: ${{ matrix.arch }}
      # 通过环境变量传递 secrets，用于条件判断
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        submodules: recursive
        lfs: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-${{ matrix.arch }}-pip-release-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-pip-release-
          ${{ runner.os }}-${{ matrix.arch }}-pip-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install frontend dependencies
      working-directory: frontend
      run: |
        rm -f package-lock.json
        npm install

    - name: Build macOS app
      run: python scripts/build_mac.py

    - name: Import Apple certificate (optional)
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      env:
        KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      run: |
        # 创建临时 keychain
        security create-keychain -p tempkey "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p tempkey "$KEYCHAIN_PATH"

        # 导入证书
        CERT_PATH="$RUNNER_TEMP/cert.p12"
        printf '%s' "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

        # 验证文件是否有效
        if [ ! -s "$CERT_PATH" ]; then
          echo "❌ Certificate file is empty or decode failed"
          exit 1
        fi

        # 导入证书（使用配置的密码）
        security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild

        # 设置 partition list
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k tempkey "$KEYCHAIN_PATH"

        # 将临时 keychain 加入搜索列表并设为默认
        security list-keychains -d user > /tmp/keychains.txt
        KEYCHAINS=$(cat /tmp/keychains.txt | tr -d '\n')
        security list-keychains -d user -s "$KEYCHAIN_PATH" $KEYCHAINS
        security default-keychain -s "$KEYCHAIN_PATH"

        # 验证身份是否可用
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        rm "$CERT_PATH"
        echo "✅ Certificate imported to $KEYCHAIN_PATH"

    - name: Sign app (optional)
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      env:
        KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      run: |
        # 确保 keychain 解锁
        security unlock-keychain -p tempkey "$KEYCHAIN_PATH"

        APP_PATH=$(ls -d dist/*.app | head -1)

        # 使用 --keychain 参数指定 keychain
        codesign --deep --force --options=runtime \
          --keychain "$KEYCHAIN_PATH" \
          --sign "$APPLE_SIGNING_IDENTITY" \
          --entitlements scripts/check/entitlements.plist \
          "$APP_PATH"

    - name: Verify signature (optional)
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      run: |
        APP_PATH=$(ls -d dist/*.app | head -1)
        codesign --verify --deep --strict "$APP_PATH"
        codesign -dvv "$APP_PATH" | head -20

    - name: Notarize app (optional)
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' && env.APPLE_ID != '' }}
      run: |
        APP_PATH=$(ls -d dist/*.app | head -1)
        APP_NAME=$(basename "$APP_PATH")

        # 打包为 zip 用于公证提交
        ditto -c -k --keepParent "$APP_PATH" "notarize.zip"

        # 提交公证并等待结果
        xcrun notarytool submit "notarize.zip" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait

        # Staple 公证结果到 app
        xcrun stapler staple "$APP_PATH"

        rm "notarize.zip"
        echo "✅ Notarization completed"

    - name: Zip app bundle
      run: |
        APP_PATH=$(ls -d dist/*.app | head -1)
        APP_NAME=$(basename "$APP_PATH")
        # 在文件名中包含架构信息
        ZIP_NAME="${APP_NAME%.app}-macos-${{ matrix.arch }}.zip"
        ditto -c -k --keepParent "$APP_PATH" "dist/${ZIP_NAME}"
        echo "ZIP_PATH=dist/${ZIP_NAME}" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AgentTeam-${{ matrix.arch }}
        path: ${{ env.ZIP_PATH }}

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List artifacts
      run: ls -la artifacts/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "AgentTeam ${{ github.ref_name }}"
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: artifacts/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}