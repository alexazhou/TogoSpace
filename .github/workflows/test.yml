name: Tests

on:
  push:
    branches:
      - '**'  # 所有分支 push，排除 tag
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-timeout pytest-xdist

    - name: Run mypy
      run: |
        bash scripts/run_mypy.sh

    - name: Run tests (parallel)
      run: |
        PYTHONPATH=src python -m pytest tests/unit tests/api tests/integration -n auto --dist loadscope --timeout=60

    - name: Run real tests
      run: |
        PYTHONPATH=src python -m pytest tests/real/ -v --timeout=30
      continue-on-error: true  # real tests 可能需要特定环境，允许失败

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache npm dependencies
      uses: actions/cache@v5
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: frontend
      run: npm run test:run
