name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., 0.1.20, latest)'
        required: true
        default: 'latest'
        type: string
      push:
        description: 'Push image to registry'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        submodules: recursive
        lfs: true

    - name: Determine image tags
      id: tags
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          # 从 git tag (v0.1.20) 提取版本号 (0.1.20)
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAGS="docker.io/${USERNAME}/togospace:${VERSION},docker.io/${USERNAME}/togospace:latest"
          PUSH="true"
        else
          # 手动触发
          TAGS="docker.io/${USERNAME}/togospace:${{ inputs.tag }}"
          PUSH="${{ inputs.push }}"
        fi
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "push=${PUSH}" >> $GITHUB_OUTPUT
      env:
        USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: ${{ steps.tags.outputs.push == 'true' }}
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ steps.tags.outputs.push }}
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image summary
      run: |
        echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Tags**: ${TAGS}" >> $GITHUB_STEP_SUMMARY
        echo "- **Pushed**: ${PUSH}" >> $GITHUB_STEP_SUMMARY
      env:
        TAGS: ${{ steps.tags.outputs.tags }}
        PUSH: ${{ steps.tags.outputs.push }}